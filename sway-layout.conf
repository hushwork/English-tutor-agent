# ── English Tutor: Workspace 1 布局保存/恢复 ─────────────────
# 本文件可被 Sway config 引用: include /home/ubuntu/workspace/english-tutor/sway-layout.conf

# --- 用法 ---
# 保存布局:  cd /home/ubuntu/workspace/english-tutor && ./save-layout.sh
# 恢复布局:  cd /home/ubuntu/workspace/english-tutor && ./restore-layout.sh
# 注意: 保存后手动编辑 workspace-layout.json 填好每个窗口的 command

# --- 自动恢复（登录时自动恢复工作区1布局）---
# 取消下面这行的注释即可启用:
# exec_always sleep 2 && /home/ubuntu/workspace/english-tutor/restore-layout.sh

# --- 绑定快捷键 ---
set $lay_save   exec /home/ubuntu/workspace/english-tutor/save-layout.sh
set $lay_restore exec /home/ubuntu/workspace/english-tutor/restore-layout.sh
bindsym $mod+Shift+S $lay_save       # $mod+Shift+S: 保存当前工作区布局
bindsym $mod+Shift+R $lay_restore    # $mod+Shift+R: 恢复保存的布局

# --- 自动定位规则（按 app_id 匹配窗口位置）---
for_window [app_id="english-tutor"] move position 6 36, resize set 1272 1398
for_window [app_id="foot"] move position 1282 36, resize set 1272 1398
