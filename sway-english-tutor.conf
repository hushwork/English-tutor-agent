# ── English Tutor — Sway 配置片段 ─────────────────────
# 加到 ~/.config/sway/config 里

# 快捷键: $mod+E 启动英语学习助手
set $english_tutor $HOME/workspace/english-tutor/start-tutor.sh
bindsym $mod+E exec $english_tutor

# 自动规则: 固定位置和大小（按 app_id 匹配）
for_window [app_id="english-tutor"] {
    move position 100 50
    resize set 900 600
    border pixel 1
}
